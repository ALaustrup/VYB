services:
  postgres:
    image: postgres:16-alpine
    container_name: vyb-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vyb
      POSTGRES_PASSWORD: vyb
      POSTGRES_DB: vyb
    volumes:
      - vyb_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vyb -d vyb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  vyb_pg_data:
